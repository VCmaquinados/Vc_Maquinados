<!-- Home con carrusel -->
<header id="home" class="vh-100 d-flex align-items-center justify-content-center text-center text-light bg-dark">
  <div id="carouselHeader" class="carousel slide carousel-fade w-100 h-100" data-bs-ride="carousel">
    <div class="carousel-inner h-100">
      <div *ngFor="let item of carouselItems; let i = index" 
           class="carousel-item h-100" 
           [class.active]="i === 0">
        <img [src]="item.image" class="d-block w-100 h-100 object-fit-cover" [alt]="item.title">
        <div class="carousel-caption d-flex flex-column justify-content-center h-100">
          <h1 class="display-4 fw-bold">{{ item.title }}</h1>
          <p class="lead">{{ item.subtitle }}</p>
          <p *ngIf="item.description">{{ item.description }}</p>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselHeader" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselHeader" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>
</header>

<!-- Servicios -->
<section id="servicios" class="py-5 bg-light">
  <div class="container">
    <h2 class="text-center mb-5 fw-bold">Nuestros Servicios</h2>
    <div class="row g-4">
      <div *ngFor="let servicio of servicios" class="col-md-6 col-lg-3">
        <div class="card h-100 text-center shadow-sm border-0 servicio-card">
          <div class="card-body">
            <div class="servicio-icon mb-3">{{ servicio.icon }}</div>
            <h5 class="card-title fw-bold">{{ servicio.title }}</h5>
            <p class="card-text">{{ servicio.desc }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Clientes -->
<section id="clientes" class="py-5">
  <div class="container">
    <h2 class="text-center mb-5 fw-bold">Nuestros Clientes</h2>
    <div class="row g-4 justify-content-center">
      <div *ngFor="let cliente of clientes" class="col-6 col-md-4 col-lg-2">
        <div class="client-logo">
          <img [src]="cliente" alt="Cliente" class="img-fluid rounded shadow-sm">
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Contacto -->
<section id="contacto" class="py-5 bg-dark text-light">
  <div class="container text-center">
    <h2 class="mb-4 fw-bold">Contáctanos</h2>
    <p class="lead mb-4">Estamos listos para ayudarte con tus proyectos.</p>
    <a href="mailto:contacto@vcmaquinados.com" class="btn btn-warning btn-lg">Enviar Mensaje</a>
  </div>
</section>
